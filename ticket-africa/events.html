<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Browse Events | Abonten Tickets</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div data-nav></div>
  <main class="section-pad">
    <div class="container">
      <div class="mb-4">
        <p class="eyebrow">Events</p>
        <h1 class="display-6 fw-bold">Browse Ghana Events</h1>
      </div>
      <div class="panel bg-white p-3 mb-4">
        <div class="row g-2">
          <div class="col-md-3"><input id="searchInput" class="form-control" placeholder="Search events"></div>
          <div class="col-md-3"><select id="categoryFilter" class="form-select"><option value="">All categories</option></select></div>
          <div class="col-md-3"><select id="locationFilter" class="form-select"><option value="">All locations</option></select></div>
          <div class="col-md-3"><input id="dateFilter" class="form-control" type="date"></div>
        </div>
      </div>
      <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" data-events-list></div>
    </div>
  </main>
  <div data-footer></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/events.js"></script>
</body>
</html>
