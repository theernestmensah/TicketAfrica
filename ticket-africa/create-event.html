<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Create Event | Abonten Tickets</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="assets/css/style.css" rel="stylesheet"></head>
<body><div data-nav></div><main class="dashboard-shell"><div class="container-fluid"><div class="row"><aside class="col-md-3 col-xl-2 sidebar p-3"><nav class="nav flex-column gap-1"><a class="nav-link" href="organizer-dashboard.html">Dashboard</a><a class="nav-link active" href="create-event.html">Create Event</a><a class="nav-link" href="manage-events.html">Manage Events</a><a class="nav-link" href="event-sales.html">Event Sales</a><a class="nav-link" href="attendees.html">Attendees</a><a class="nav-link" href="scan-ticket.html">Scan Ticket</a></nav></aside><section class="col-md-9 col-xl-10 p-4"><p class="eyebrow">Organizer</p><h1 class="h3 fw-bold mb-4">Create Event</h1><div data-create-alert></div><form id="createEventForm" class="panel bg-white p-4"><div class="row g-3"><div class="col-md-6"><label class="form-label">Event title</label><input class="form-control" name="title" required></div><div class="col-md-6"><label class="form-label">Image URL</label><input class="form-control" name="image" value="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&w=1200&q=80" required></div><div class="col-12"><label class="form-label">Description</label><textarea class="form-control" name="description" rows="3" required></textarea></div><div class="col-md-4"><label class="form-label">Location</label><input class="form-control" name="location" placeholder="Labadi, Accra" required></div><div class="col-md-4"><label class="form-label">Category</label><select class="form-select" name="category" required><option>Music</option><option>Conference</option><option>Food</option><option>Arts</option><option>Sports</option></select></div><div class="col-md-4"><label class="form-label">Date</label><input class="form-control" type="date" name="date" required></div><div class="col-md-6"><label class="form-label">Start time</label><input class="form-control" type="time" name="startTime" required></div><div class="col-md-6"><label class="form-label">End time</label><input class="form-control" type="time" name="endTime" required></div></div><hr><div class="d-flex justify-content-between align-items-center mb-2"><h2 class="h5 mb-0">Ticket Types</h2><button id="addTicketType" class="btn btn-outline-success btn-sm" type="button">Add Ticket Type</button></div><div id="ticketTypeRows"></div><button class="btn btn-brand mt-3" type="submit">Save Event</button></form></section></div></div></main><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="assets/js/main.js"></script><script src="assets/js/dashboard.js"></script></body></html>
