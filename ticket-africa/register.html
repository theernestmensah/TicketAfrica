<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | Ticket Africa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div data-nav></div>
  <main class="section-pad">
    <div class="container">
      <form class="panel bg-white p-4 mx-auto" style="max-width: 520px;">
        <p class="eyebrow">Customer Account</p>
        <h1 class="h3 fw-bold mb-4">Create your account</h1>
        <div class="mb-3"><label class="form-label">Full name</label><input class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Email</label><input class="form-control" type="email" required></div>
        <div class="mb-3"><label class="form-label">Phone</label><input class="form-control" type="tel" required></div>
        <div class="mb-4"><label class="form-label">Password</label><input class="form-control" type="password" required></div>
        <a class="btn btn-brand w-100" href="events.html">Create Account</a>
      </form>
    </div>
  </main>
  <div data-footer></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
