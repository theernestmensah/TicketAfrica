<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout | Abonten Tickets</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div data-nav></div>
  <main class="section-pad">
    <div class="container">
      <p class="eyebrow">Checkout</p>
      <h1 class="display-6 fw-bold mb-4">Complete Your Ticket Order</h1>
      <div class="row g-4">
        <div class="col-lg-7">
          <form id="checkoutForm" class="panel bg-white p-4">
            <div class="mb-3"><label class="form-label">Full name</label><input class="form-control" name="fullName" required></div>
            <div class="mb-3"><label class="form-label">Email</label><input class="form-control" name="email" type="email" required></div>
            <div class="mb-4"><label class="form-label">Phone number</label><input class="form-control" name="phone" type="tel" placeholder="+233 24 000 0000" required></div>
            <button class="btn btn-brand btn-lg w-100" type="submit">Pay with Paystack</button>
          </form>
        </div>
        <div class="col-lg-5"><aside class="panel bg-white p-4" data-checkout-summary></aside></div>
      </div>
    </div>
  </main>
  <div data-footer></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/checkout.js"></script>
</body>
</html>
