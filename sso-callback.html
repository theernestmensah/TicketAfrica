<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        body {
            background-color: #191919;
            color: #D4AF37;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.2);
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <span>Verifying your account…</span>

    <script src="assets/js/env.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Determine where to land after OAuth based on a `redirect` param
            // e.g. redirectUrl: `.../sso-callback.html?redirect=organizer`
            const params = new URLSearchParams(window.location.search);
            const dest = params.get('redirect') === 'organizer'
                ? '/organizer-dashboard.html'
                : '/account.html';

            try {
                // Inject and wait for Clerk
                const clerkScript = document.createElement('script');
                clerkScript.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
                clerkScript.setAttribute('data-clerk-publishable-key', window.ENV.CLERK_PUBLISHABLE_KEY);
                clerkScript.crossOrigin = 'anonymous';
                document.head.appendChild(clerkScript);

                await new Promise((resolve, reject) => {
                    clerkScript.onload = resolve;
                    clerkScript.onerror = () => reject(new Error('Clerk failed to load'));
                });

                await window.Clerk.load();
                await window.Clerk.handleRedirectCallback({
                    redirectUrl: `${window.location.origin}${dest}`,
                });

                // Sync Convex user record immediately after successful auth
                const clerkUser = window.Clerk.user;
                if (clerkUser) {
                    try {
                        // Lazy-load the Convex client to upsert the user
                        const { ConvexHttpClient } = await import('https://esm.sh/convex@1.32.0/browser');
                        const convex = new ConvexHttpClient('https://zealous-ptarmigan-734.convex.cloud');
                        if (window.Clerk.session) {
                            const token = await window.Clerk.session.getToken();
                            convex.setAuth(token);
                        }
                        await convex.mutation('users:upsertUser', {
                            clerk_id: clerkUser.id,
                            email: clerkUser.primaryEmailAddress?.emailAddress || '',
                            first_name: clerkUser.firstName || '',
                            last_name: clerkUser.lastName || '',
                        });
                    } catch (syncErr) {
                        console.warn('[SSO] Convex sync error (non-fatal):', syncErr);
                    }
                }

            } catch (err) {
                console.error('SSO callback error:', err);
                window.location.href = dest;
            }
        });
    </script>
</body>
</html>
