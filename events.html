<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Discover events across Africa — concerts, sports, festivals, conferences and more. Browse by country, filter by city, category, date and price." />
    <title>Discover Events — Ticket Africa</title>
    <script type="module" src="/assets/js/db.js"></script>
    <link rel="stylesheet" href="assets/css/core.css" />
    <link rel="stylesheet" href="assets/css/nav-footer.css" />
    <style>
        [data-reveal] {
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 400ms ease, transform 400ms ease;
        }

        [data-reveal].revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Country Selector Hero ── */
        .country-hero {
            background: var(--color-bg-elevated);
            border-bottom: 1px solid var(--color-border);
            padding: var(--space-8) 0 0;
            margin-top: 68px;
        }

        .country-hero__top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-6);
            flex-wrap: wrap;
            margin-bottom: var(--space-6);
        }

        .country-hero h1 {
            font-family: var(--font-display);
            font-size: var(--text-4xl);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: var(--space-1);
        }

        .country-hero__subtitle {
            color: var(--color-text-muted);
            font-size: var(--text-sm);
        }

        /* ── Country Tabs ── */
        .country-tabs {
            display: flex;
            gap: 0;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            border-top: 1px solid var(--color-border);
        }

        .country-tabs::-webkit-scrollbar {
            display: none;
        }

        .country-tab {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-4) var(--space-5);
            border-bottom: 2px solid transparent;
            color: var(--color-text-muted);
            font-size: var(--text-sm);
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            transition: all var(--transition-fast);
            position: relative;
        }

        .country-tab:hover {
            color: var(--color-text-primary);
            background: rgba(255, 255, 255, 0.02);
        }

        .country-tab.active {
            color: var(--color-text-primary);
            border-bottom-color: var(--color-text-primary);
        }

        .country-tab__flag {
            font-size: 1.25rem;
            line-height: 1;
        }

        .country-tab__currency {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            background: rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-full);
            padding: 2px 8px;
            font-weight: 500;
        }

        .country-tab.active .country-tab__currency {
            background: var(--color-secondary);
            color: var(--color-text-primary);
        }

        /* ── Main Layout ── */
        .discovery-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: var(--space-8);
            align-items: flex-start;
            padding-top: var(--space-8);
            padding-bottom: var(--space-16);
        }

        /* ── Filter Sidebar ── */
        .filter-sidebar {
            position: sticky;
            top: 84px;
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: var(--space-5);
        }

        .filter-sidebar__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-5);
            padding-bottom: var(--space-4);
            border-bottom: 1px solid var(--color-border);
        }

        .filter-sidebar__title {
            font-family: var(--font-display);
            font-size: var(--text-base);
            font-weight: 700;
        }

        .filter-clear {
            font-size: var(--text-xs);
            color: var(--color-text-primary);
            font-weight: 600;
            cursor: pointer;
            background: none;
            border: none;
        }

        .filter-group {
            margin-bottom: var(--space-5);
            padding-bottom: var(--space-5);
            border-bottom: 1px solid var(--color-border);
        }

        .filter-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .filter-group__label {
            font-size: var(--text-xs);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--color-text-muted);
            margin-bottom: var(--space-3);
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background var(--transition-fast);
            user-select: none;
        }

        .filter-option:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .filter-option input[type="checkbox"],
        .filter-option input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: var(--color-text-primary);
            cursor: pointer;
            flex-shrink: 0;
        }

        .filter-option__text {
            flex: 1;
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
        }

        .filter-option__count {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            font-weight: 500;
        }

        /* Currency indicator in price filter */
        .currency-indicator {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-bottom: var(--space-3);
            padding: var(--space-2) var(--space-3);
            background: var(--color-bg-elevated);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: var(--text-xs);
            color: var(--color-text-primary);
            font-weight: 700;
        }

        .filter-price-range {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-3);
        }

        .filter-price-range input {
            width: 100%;
            padding: var(--space-2) var(--space-3);
            background: var(--color-bg-input);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            color: var(--color-text-primary);
            font-size: var(--text-sm);
            outline: none;
        }

        .filter-price-range input:focus {
            border-color: var(--color-text-primary);
        }

        /* ── Events Main Panel ── */
        .events-main__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-4);
            margin-bottom: var(--space-6);
            flex-wrap: wrap;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-3) var(--space-4);
            flex: 1;
            max-width: 460px;
            transition: border-color var(--transition-fast);
        }

        .search-bar:focus-within {
            border-color: var(--color-text-primary);
        }

        .search-bar svg {
            width: 16px;
            height: 16px;
            color: var(--color-text-muted);
            flex-shrink: 0;
        }

        .search-bar input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-size: var(--text-sm);
            color: var(--color-text-primary);
        }

        .search-bar input::placeholder {
            color: var(--color-text-muted);
        }

        .sort-select {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            font-size: var(--text-sm);
            color: var(--color-text-primary);
            cursor: pointer;
            outline: none;
        }

        .sort-select:focus {
            border-color: var(--color-text-primary);
        }

        .results-count {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
        }

        .results-count strong {
            color: var(--color-text-primary);
            font-weight: 700;
        }

        /* ── Country Context Banner ── */
        .country-context-banner {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-4);
            background: rgba(139, 92, 246, 0.06);
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-5);
            font-size: var(--text-sm);
        }

        .country-context-banner__flag {
            font-size: 1.25rem;
        }

        .country-context-banner__text {
            flex: 1;
            color: var(--color-text-secondary);
        }

        .country-context-banner__text strong {
            color: var(--color-text-primary);
        }

        .country-context-banner__currency {
            font-size: var(--text-xs);
            font-weight: 700;
            color: var(--color-secondary);
            background: rgba(139, 92, 246, 0.15);
            padding: 4px 10px;
            border-radius: var(--radius-full);
        }

        /* Quick filter pills */
        .quick-filters {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
            margin-bottom: var(--space-6);
        }

        .quick-filter {
            padding: var(--space-2) var(--space-4);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--color-text-secondary);
            cursor: pointer;
            background: transparent;
            transition: all var(--transition-fast);
        }

        .quick-filter:hover,
        .quick-filter.active {
            background: var(--color-primary);
            border-color: var(--color-text-primary);
            color: white;
        }

        /* Grid */
        .events-grid--discovery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-5);
        }

        /* Event Card */
        .event-card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition-base);
            display: flex;
            flex-direction: column;
            text-decoration: none;
        }

        .event-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: var(--color-border-light);
        }

        .event-card__image {
            position: relative;
            height: 180px;
            overflow: hidden;
        }

        .event-card__image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 400ms ease;
        }

        .event-card:hover .event-card__image img {
            transform: scale(1.05);
        }

        .event-card__image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .event-card__badges {
            position: absolute;
            top: var(--space-3);
            left: var(--space-3);
            display: flex;
            gap: var(--space-2);
        }

        .event-card__save {
            position: absolute;
            top: var(--space-3);
            right: var(--space-3);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(13, 13, 13, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text-secondary);
            transition: all var(--transition-fast);
            z-index: 1;
        }

        .event-card__save:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--color-text-primary);
            color: var(--color-text-primary);
        }

        .event-card__save svg {
            width: 14px;
            height: 14px;
        }

        .event-card__body {
            padding: var(--space-5);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .event-card__category {
            font-size: var(--text-xs);
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-text-primary);
            margin-bottom: var(--space-2);
        }

        .event-card__title {
            font-family: var(--font-display);
            font-size: var(--text-base);
            font-weight: 700;
            color: var(--color-text-primary);
            line-height: 1.3;
            margin-bottom: var(--space-3);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .event-card__detail {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            margin-bottom: var(--space-2);
        }

        .event-card__detail svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .event-card__footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: var(--space-4);
            border-top: 1px solid var(--color-border);
            margin-top: auto;
        }

        .event-card__price-from {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
        }

        .event-card__price-value {
            font-family: var(--font-display);
            font-size: var(--text-lg);
            font-weight: 800;
        }

        .event-card__price-value span {
            font-size: var(--text-sm);
            font-weight: 400;
            color: var(--color-text-muted);
        }

        .avail--hot { color: var(--color-error); font-size: var(--text-xs); font-weight: 600; }
        .avail--limited { color: var(--color-warning); font-size: var(--text-xs); font-weight: 600; }
        .avail--ok { color: var(--color-success); font-size: var(--text-xs); font-weight: 600; }
        .avail--sold { color: var(--color-text-muted); font-size: var(--text-xs); font-weight: 600; }

        /* Sold out overlay */
        .sold-out-overlay {
            position: absolute;
            inset: 0;
            background: rgba(13, 13, 13, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sold-out-badge {
            background: var(--color-error);
            color: white;
            font-size: var(--text-xs);
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-sm);
            transform: rotate(-3deg);
        }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            margin-top: var(--space-10);
        }

        .page-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--color-text-secondary);
            cursor: pointer;
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            transition: all var(--transition-fast);
        }

        .page-btn:hover,
        .page-btn.active {
            background: var(--color-primary);
            border-color: var(--color-text-primary);
            color: white;
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Mobile filter toggle */
        .mobile-filter-btn {
            display: none;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--space-16) var(--space-8);
            text-align: center;
            grid-column: 1 / -1;
        }

        .empty-state__icon {
            font-size: 3rem;
            margin-bottom: var(--space-4);
            opacity: 0.4;
        }

        .empty-state__title {
            font-family: var(--font-display);
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: var(--space-2);
        }

        .empty-state__text {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            max-width: 320px;
        }

        @media (max-width: 1024px) {
            .discovery-layout {
                grid-template-columns: 1fr;
            }

            .filter-sidebar {
                position: static;
                display: none;
            }

            .filter-sidebar.open {
                display: block;
            }

            .mobile-filter-btn {
                display: flex;
            }

            .events-grid--discovery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .events-grid--discovery {
                grid-template-columns: 1fr;
            }

            .country-hero h1 {
                font-size: var(--text-3xl);
            }
        }
    </style>
</head>

<body>
    <div id="nav-root"></div>

    <!-- Country Hero Bar -->
    <div class="country-hero" id="discovery-hero">
        <div class="container">
            <div class="country-hero__top">
                <div>
                    <h1>Discover Events</h1>
                    <p class="country-hero__subtitle" id="discovery-subtitle">Showing events across Africa</p>
                </div>
                <div style="display:flex;gap:var(--space-3);align-items:center;flex-wrap:wrap;">
                    <div class="search-bar" style="max-width:360px;">
                        <iconify-icon icon="hugeicons:search-01"></iconify-icon>
                        <input type="search" placeholder="Search events, artists, venues…" id="main-search" />
                    </div>
                    <button class="mobile-filter-btn btn btn--secondary" id="toggle-filters-btn">
                        <iconify-icon icon="hugeicons:menu-01" style="width:16px;height:16px;"></iconify-icon>
                        Filters
                    </button>
                </div>
            </div>

            <!-- Country Tabs -->
            <nav class="country-tabs" id="country-tabs" role="tablist" aria-label="Browse by country">
                <button class="country-tab active" id="ctab-all" data-country="" data-currency="GHS" data-currency-symbol="GH₵" role="tab" aria-selected="true">
                    <span class="country-tab__flag">🌍</span>
                    All Africa
                    <span class="country-tab__currency">Multi</span>
                </button>
                <button class="country-tab" id="ctab-gh" data-country="Ghana" data-currency="GHS" data-currency-symbol="GH₵" role="tab" aria-selected="false">
                    <span class="country-tab__flag">🇬🇭</span>
                    Ghana
                    <span class="country-tab__currency">GH₵</span>
                </button>
                <button class="country-tab" id="ctab-ng" data-country="Nigeria" data-currency="NGN" data-currency-symbol="₦" role="tab" aria-selected="false">
                    <span class="country-tab__flag">🇳🇬</span>
                    Nigeria
                    <span class="country-tab__currency">₦</span>
                </button>
                <button class="country-tab" id="ctab-ke" data-country="Kenya" data-currency="KES" data-currency-symbol="KSh" role="tab" aria-selected="false">
                    <span class="country-tab__flag">🇰🇪</span>
                    Kenya
                    <span class="country-tab__currency">KSh</span>
                </button>
                <button class="country-tab" id="ctab-za" data-country="South Africa" data-currency="ZAR" data-currency-symbol="R" role="tab" aria-selected="false">
                    <span class="country-tab__flag">🇿🇦</span>
                    South Africa
                    <span class="country-tab__currency">ZAR</span>
                </button>
                <button class="country-tab" id="ctab-rw" data-country="Rwanda" data-currency="RWF" data-currency-symbol="RWF" role="tab" aria-selected="false">
                    <span class="country-tab__flag">🇷🇼</span>
                    Rwanda
                    <span class="country-tab__currency">RWF</span>
                </button>
                <button class="country-tab" id="ctab-tz" data-country="Tanzania" data-currency="TZS" data-currency-symbol="TSh" role="tab" aria-selected="false">
                    <span class="country-tab__flag">🇹🇿</span>
                    Tanzania
                    <span class="country-tab__currency">TSh</span>
                </button>
                <button class="country-tab" id="ctab-ug" data-country="Uganda" data-currency="UGX" data-currency-symbol="USh" role="tab" aria-selected="false">
                    <span class="country-tab__flag">🇺🇬</span>
                    Uganda
                    <span class="country-tab__currency">USh</span>
                </button>
            </nav>
        </div>
    </div>

    <div class="container">
        <div class="discovery-layout">

            <!-- Filter Sidebar -->
            <aside class="filter-sidebar" id="filter-sidebar">
                <div class="filter-sidebar__header">
                    <span class="filter-sidebar__title">Filters</span>
                    <button class="filter-clear" id="clear-filters">Clear all</button>
                </div>

                <!-- City Filter -->
                <div class="filter-group" id="city-filter-group">
                    <div class="filter-group__label">City</div>
                    <div class="filter-options" id="city-filter-options">
                        <!-- Dynamically populated based on selected country -->
                    </div>
                </div>

                <!-- Date -->
                <div class="filter-group">
                    <div class="filter-group__label">Date</div>
                    <div class="filter-options">
                        <label class="filter-option"><input type="radio" name="date" id="f-today" /><span class="filter-option__text">Today</span></label>
                        <label class="filter-option"><input type="radio" name="date" id="f-tomorrow" /><span class="filter-option__text">Tomorrow</span></label>
                        <label class="filter-option"><input type="radio" name="date" id="f-week" /><span class="filter-option__text">This week</span></label>
                        <label class="filter-option"><input type="radio" name="date" id="f-month" checked /><span class="filter-option__text">This month</span></label>
                        <label class="filter-option"><input type="radio" name="date" id="f-anytime" /><span class="filter-option__text">Any time</span></label>
                    </div>
                </div>

                <!-- Price -->
                <div class="filter-group">
                    <div class="filter-group__label">Price Range</div>
                    <div class="currency-indicator" id="currency-indicator">
                        <iconify-icon icon="hugeicons:money-01"></iconify-icon>
                        <span id="price-currency-label">Prices shown in GH₵</span>
                    </div>
                    <div class="filter-price-range">
                        <input type="number" placeholder="Min" id="f-price-min" value="0" />
                        <input type="number" placeholder="Max" id="f-price-max" value="1000" />
                    </div>
                </div>

                <!-- Availability -->
                <div class="filter-group">
                    <div class="filter-group__label">Availability</div>
                    <div class="filter-options">
                        <label class="filter-option"><input type="checkbox" id="f-avail" checked /><span class="filter-option__text">Available only</span></label>
                        <label class="filter-option"><input type="checkbox" id="f-free" /><span class="filter-option__text">Free events</span></label>
                    </div>
                </div>

                <button class="btn btn--primary btn--full" id="apply-filters" style="margin-top:var(--space-2);">Apply Filters</button>
            </aside>

            <!-- Events Main -->
            <main>
                <!-- Country Context Banner -->
                <div class="country-context-banner" id="country-context-banner">
                    <span class="country-context-banner__flag" id="ctx-flag">🌍</span>
                    <span class="country-context-banner__text">
                        Showing events across <strong id="ctx-name">All Africa</strong> — prices displayed in local currency
                    </span>
                    <span class="country-context-banner__currency" id="ctx-currency">Multi-currency</span>
                </div>

                <!-- Quick filter pills -->
                <div class="quick-filters" id="quick-filters">
                    <button class="quick-filter active" id="qf-all">All Events</button>
                    <button class="quick-filter" id="qf-today">Today</button>
                    <button class="quick-filter" id="qf-weekend">This Weekend</button>
                    <button class="quick-filter" id="qf-free">Free</button>
                    <button class="quick-filter" id="qf-concerts">Concerts</button>
                    <button class="quick-filter" id="qf-sports">Sports</button>
                    <button class="quick-filter" id="qf-festivals">Festivals</button>
                    <button class="quick-filter" id="qf-conferences">Conferences</button>
                </div>

                <div class="events-main__header">
                    <span class="results-count" id="results-count">Loading events…</span>
                    <select class="sort-select" id="sort-select" aria-label="Sort events">
                        <option value="trending">Trending</option>
                        <option value="date-asc">Date: Earliest first</option>
                        <option value="date-desc">Date: Latest first</option>
                        <option value="price-asc">Price: Low to high</option>
                        <option value="price-desc">Price: High to low</option>
                    </select>
                </div>

                <div class="events-grid--discovery" id="events-grid">
                    <!-- Events injected here -->
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination" style="display:none;"></div>
            </main>
        </div>
    </div>

    <div id="footer-root"></div>

    <script src="assets/js/core.js"></script>
    <script src="assets/js/nav.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        /* =============================================================
           TICKET AFRICA — Events Discovery Page
           Country browser + currency-aware pricing
           ============================================================= */

        // ── Country Config ─────────────────────────────────────
        const COUNTRY_CONFIG = {
            '': { // All Africa
                name: 'All Africa',
                flag: '🌍',
                currency: 'GHS',
                currencySymbol: 'GH₵',
                currencyLabel: 'Multi-currency',
                cities: [],
                priceMax: 1000,
                placeholder: 'All cities'
            },
            Ghana: {
                name: 'Ghana',
                flag: '🇬🇭',
                currency: 'GHS',
                currencySymbol: 'GH₵',
                currencyLabel: 'GH₵ (Ghanaian Cedi)',
                cities: ['Accra', 'Kumasi', 'Tamale', 'Cape Coast', 'Takoradi'],
                priceMax: 1000,
                placeholder: 'All Ghanaian cities'
            },
            Nigeria: {
                name: 'Nigeria',
                flag: '🇳🇬',
                currency: 'NGN',
                currencySymbol: '₦',
                currencyLabel: '₦ (Nigerian Naira)',
                cities: ['Lagos', 'Abuja', 'Port Harcourt', 'Ibadan', 'Kano'],
                priceMax: 500000,
                placeholder: 'All Nigerian cities'
            },
            Kenya: {
                name: 'Kenya',
                flag: '🇰🇪',
                currency: 'KES',
                currencySymbol: 'KSh',
                currencyLabel: 'KSh (Kenyan Shilling)',
                cities: ['Nairobi', 'Mombasa', 'Kisumu', 'Nakuru', 'Eldoret'],
                priceMax: 20000,
                placeholder: 'All Kenyan cities'
            },
            'South Africa': {
                name: 'South Africa',
                flag: '🇿🇦',
                currency: 'ZAR',
                currencySymbol: 'R',
                currencyLabel: 'R (South African Rand)',
                cities: ['Johannesburg', 'Cape Town', 'Durban', 'Pretoria', 'Port Elizabeth'],
                priceMax: 5000,
                placeholder: 'All South African cities'
            },
            Rwanda: {
                name: 'Rwanda',
                flag: '🇷🇼',
                currency: 'RWF',
                currencySymbol: 'RWF',
                currencyLabel: 'RWF (Rwandan Franc)',
                cities: ['Kigali', 'Butare', 'Gisenyi', 'Ruhengeri'],
                priceMax: 50000,
                placeholder: 'All Rwandan cities'
            },
            Tanzania: {
                name: 'Tanzania',
                flag: '🇹🇿',
                currency: 'TZS',
                currencySymbol: 'TSh',
                currencyLabel: 'TSh (Tanzanian Shilling)',
                cities: ['Dar es Salaam', 'Zanzibar City', 'Arusha', 'Mwanza'],
                priceMax: 200000,
                placeholder: 'All Tanzanian cities'
            },
            Uganda: {
                name: 'Uganda',
                flag: '🇺🇬',
                currency: 'UGX',
                currencySymbol: 'USh',
                currencyLabel: 'USh (Ugandan Shilling)',
                cities: ['Kampala', 'Entebbe', 'Gulu', 'Mbarara'],
                priceMax: 500000,
                placeholder: 'All Ugandan cities'
            }
        };

        // Sample event data — populated dynamically from DB in production
        const DEMO_EVENTS = [];

        // ── State ───────────────────────────────────────────────
        let state = {
            country: '',
            currency: 'GHS',
            currencySymbol: 'GH₵',
            quickFilter: 'all',
            search: '',
            cities: []
        };

        // ── Helpers ─────────────────────────────────────────────
        function formatPrice(amount, currency) {
            const symbols = {
                GHS: 'GH₵', NGN: '₦', KES: 'KSh', ZAR: 'R',
                RWF: 'RWF', TZS: 'TSh', UGX: 'USh'
            };
            const sym = symbols[currency] || currency;
            if (amount === 0) return 'Free';
            return `${sym} ${parseFloat(amount).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;
        }

        function getAvailClass(avail) {
            return { hot: 'avail--hot', limited: 'avail--limited', ok: 'avail--ok', sold: 'avail--sold' }[avail] || 'avail--ok';
        }

        function getAvailLabel(avail) {
            return { hot: '🔥 Almost gone', limited: '⚡ Limited seats', ok: '✓ Available', sold: '✕ Sold out' }[avail] || '';
        }

        // ── Render City Filters ──────────────────────────────────
        function renderCityFilters(country) {
            const cfg = COUNTRY_CONFIG[country] || COUNTRY_CONFIG[''];
            const container = document.getElementById('city-filter-options');
            const group = document.getElementById('city-filter-group');

            if (!cfg.cities || cfg.cities.length === 0) {
                group.style.display = 'none';
                return;
            }

            group.style.display = '';
            container.innerHTML = cfg.cities.map(city => `
                <label class="filter-option">
                    <input type="checkbox" class="city-filter-cb" value="${city}" />
                    <span class="filter-option__text">${city}</span>
                </label>
            `).join('');
        }

        // ── Update Country Context ───────────────────────────────
        function updateCountryContext(country) {
            const cfg = COUNTRY_CONFIG[country] || COUNTRY_CONFIG[''];

            // Update banner
            document.getElementById('ctx-flag').textContent = cfg.flag;
            document.getElementById('ctx-name').textContent = cfg.name;
            document.getElementById('ctx-currency').textContent = cfg.currencyLabel;

            // Update subtitle
            document.getElementById('discovery-subtitle').textContent =
                country ? `Events in ${cfg.name} — prices in ${cfg.currencyLabel}` : 'Events across Africa — in local currencies';

            // Update price filter label
            document.getElementById('price-currency-label').textContent = `Prices in ${cfg.currencyLabel}`;
            document.getElementById('f-price-max').value = cfg.priceMax;

            // Update city filters
            renderCityFilters(country);

            // Update state
            state.country = country;
            state.currency = cfg.currency;
            state.currencySymbol = cfg.currencySymbol;
        }

        // ── Render Events ────────────────────────────────────────
        function renderEvents(events) {
            const grid = document.getElementById('events-grid');
            const countEl = document.getElementById('results-count');

            if (events.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state__icon">🔍</div>
                        <div class="empty-state__title">No events found</div>
                        <p class="empty-state__text">Try adjusting your filters or explore another country to discover more events.</p>
                    </div>`;
                countEl.innerHTML = '<strong>0</strong> events found';
                return;
            }

            countEl.innerHTML = `<strong>${events.length}</strong> event${events.length !== 1 ? 's' : ''} found`;

            grid.innerHTML = events.map(ev => {
                const isSoldOut = ev.availability === 'sold';
                const priceStr = formatPrice(ev.price, ev.currency);
                const availClass = getAvailClass(ev.availability);
                const availLabel = getAvailLabel(ev.availability);

                return `
                <a class="event-card" href="event-detail.html?id=${ev.id}" data-reveal>
                    <div class="event-card__image">
                        <div class="event-card__image-placeholder" style="background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(236,72,153,0.1));">
                            ${ev.emoji}
                        </div>
                        <div class="event-card__badges">
                            ${ev.badge ? `<span class="badge badge--primary">${ev.badge}</span>` : ''}
                            <span class="badge badge--neutral">${ev.category}</span>
                        </div>
                        <button class="event-card__save" data-saved="false" aria-label="Save event" onclick="event.preventDefault();event.stopPropagation();toggleSave(this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                        </button>
                        ${isSoldOut ? `<div class="sold-out-overlay"><div class="sold-out-badge">Sold Out</div></div>` : ''}
                    </div>
                    <div class="event-card__body">
                        <div class="event-card__category">${ev.category}</div>
                        <div class="event-card__title">${ev.title}</div>
                        <div class="event-card__detail">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            ${ev.date}
                        </div>
                        <div class="event-card__detail">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            ${ev.venue} · <span style="color:var(--color-text-secondary)">${ev.city}</span>
                        </div>
                        <div class="event-card__footer">
                            <div>
                                <div class="event-card__price-from">From</div>
                                <div class="event-card__price-value">${priceStr}</div>
                            </div>
                            <span class="${availClass}">${availLabel}</span>
                        </div>
                    </div>
                </a>`;
            }).join('');

            // Trigger scroll reveal
            if (window.TA && TA.initScrollReveal) TA.initScrollReveal();
        }

        // ── Filter Events ────────────────────────────────────────
        function filterAndRender() {
            let filtered = [...DEMO_EVENTS];

            // Country filter
            if (state.country) {
                filtered = filtered.filter(ev => ev.country === state.country);
            }

            // City filter
            const checkedCities = Array.from(document.querySelectorAll('.city-filter-cb:checked')).map(cb => cb.value);
            if (checkedCities.length > 0) {
                filtered = filtered.filter(ev => checkedCities.includes(ev.city));
            }

            // Quick filter
            const qf = state.quickFilter;
            if (qf === 'free') filtered = filtered.filter(ev => ev.price === 0);
            else if (qf === 'concerts') filtered = filtered.filter(ev => ev.category === 'Concert');
            else if (qf === 'sports') filtered = filtered.filter(ev => ev.category === 'Sports');
            else if (qf === 'festivals') filtered = filtered.filter(ev => ev.category === 'Festival');
            else if (qf === 'conferences') filtered = filtered.filter(ev => ev.category === 'Conference');

            // Availability filter
            if (document.getElementById('f-avail')?.checked) {
                filtered = filtered.filter(ev => ev.availability !== 'sold');
            }
            if (document.getElementById('f-free')?.checked) {
                filtered = filtered.filter(ev => ev.price === 0);
            }

            // Search
            if (state.search) {
                const q = state.search.toLowerCase();
                filtered = filtered.filter(ev =>
                    ev.title.toLowerCase().includes(q) ||
                    ev.city.toLowerCase().includes(q) ||
                    ev.category.toLowerCase().includes(q)
                );
            }

            // Sort
            const sort = document.getElementById('sort-select')?.value || 'trending';
            if (sort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
            else if (sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);

            renderEvents(filtered);
        }

        // ── Toggle Save ──────────────────────────────────────────
        function toggleSave(btn) {
            const saved = btn.dataset.saved === 'true';
            btn.dataset.saved = !saved;
            const svg = btn.querySelector('svg');
            svg.style.fill = !saved ? 'var(--color-primary)' : 'none';
            svg.style.stroke = !saved ? 'var(--color-primary)' : 'currentColor';
            if (window.TA) TA.toast(!saved ? 'Event saved ✓' : 'Event removed', !saved ? 'success' : 'info');
        }

        // ── Init ─────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', function () {

            // Initial render
            renderCityFilters('');
            filterAndRender();

            // Country tab switching
            document.getElementById('country-tabs').addEventListener('click', function (e) {
                const tab = e.target.closest('.country-tab');
                if (!tab) return;

                // Update active tab
                document.querySelectorAll('.country-tab').forEach(t => {
                    t.classList.remove('active');
                    t.setAttribute('aria-selected', 'false');
                });
                tab.classList.add('active');
                tab.setAttribute('aria-selected', 'true');

                const country = tab.dataset.country;
                updateCountryContext(country);
                filterAndRender();
            });

            // Quick filter pills
            document.getElementById('quick-filters').addEventListener('click', function (e) {
                const btn = e.target.closest('.quick-filter');
                if (!btn) return;
                document.querySelectorAll('.quick-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const id = btn.id.replace('qf-', '');
                state.quickFilter = id;
                filterAndRender();
            });

            // Mobile filter toggle
            document.getElementById('toggle-filters-btn')?.addEventListener('click', function () {
                document.getElementById('filter-sidebar').classList.toggle('open');
            });

            // Apply filters
            document.getElementById('apply-filters')?.addEventListener('click', function () {
                filterAndRender();
                if (window.TA) TA.toast('Filters applied', 'success');
            });

            // Clear filters
            document.getElementById('clear-filters')?.addEventListener('click', function () {
                document.querySelectorAll('.filter-sidebar input[type="checkbox"]').forEach(c => c.checked = false);
                document.querySelectorAll('.filter-sidebar input[type="radio"]').forEach(r => r.checked = false);
                document.getElementById('f-avail').checked = true;
                document.getElementById('f-price-min').value = 0;
                document.getElementById('f-price-max').value = COUNTRY_CONFIG[state.country]?.priceMax || 1000;
                state.quickFilter = 'all';
                document.querySelectorAll('.quick-filter').forEach(b => b.classList.remove('active'));
                document.getElementById('qf-all').classList.add('active');
                filterAndRender();
                if (window.TA) TA.toast('Filters cleared', 'info');
            });

            // Search
            const searchInput = document.getElementById('main-search');
            let searchTimeout;
            searchInput?.addEventListener('input', function () {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    state.search = this.value.trim();
                    filterAndRender();
                }, 300);
            });

            // Sort change
            document.getElementById('sort-select')?.addEventListener('change', filterAndRender);
        });
    </script>
</body>

</html>
